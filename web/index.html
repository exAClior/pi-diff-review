<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>pi diff review</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-copy">
          <div class="title-row">
            <h1>Diff review</h1>
            <div id="flash-message" class="flash-message" hidden></div>
          </div>
          <p id="repo-root" class="repo-root"></p>
        </div>
        <div class="topbar-actions">
          <div id="summary" class="summary"></div>
          <button id="overall-note-button" type="button" class="button">Overall note</button>
          <button id="cancel-button" type="button" class="button">Cancel</button>
          <button id="submit-button" type="button" class="button button-primary">Submit review</button>
        </div>
      </header>

      <div class="content-grid">
        <aside class="sidebar">
          <div class="sidebar-title">Changed files</div>
          <div id="file-tree" class="tree-mount"></div>
        </aside>

        <main class="main-pane">
          <div class="main-header">
            <div>
              <div id="current-file-label" class="current-file-label"></div>
              <div id="current-file-meta" class="current-file-meta"></div>
            </div>
            <button id="file-comment-button" type="button" class="button">Add file comment</button>
          </div>

          <section id="file-comments" class="file-comments" hidden></section>
          <div id="diff-root" class="diff-root"></div>
        </main>
      </div>
    </div>

    <div id="modal-root"></div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
